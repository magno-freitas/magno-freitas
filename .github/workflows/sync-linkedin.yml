name: Sync LinkedIn to README

on:
  schedule:
    # Roda todos os dias às 00:00 UTC (ajuste como preferir)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar o script manualmente clicando em um botão no GitHub

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install -r requirements.txt

      - name: Executar Script de Sincronização
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: python scripts/update_readme.py

      - name: Commit e Push das Alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Só faz o commit se houverem mudanças
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update README based on LinkedIn profile" && git push)
